networks:
  dev-network:
    external: true

services:

  vyapar-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vyapar-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - dev-network

  vyapar-nginx:
    image: nginx:alpine
    container_name: vyapar-nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:8010:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - vyapar-app
    networks:
      - dev-network

  # ─── Vite Dev Server (Hot Reload) ──────────────────────────
  vyapar-vite:
    image: node:20-alpine
    container_name: vyapar-vite
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["sh", "-c", "npm install --no-audit --no-fund && npm run dev"]
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
    networks:
      - dev-network