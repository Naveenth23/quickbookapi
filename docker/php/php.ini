; ==============================================================
; PHP Configuration for Laravel Docker Projects
; Place at: your-project/docker/php/php.ini
; ==============================================================

[PHP]

; ─── Error Reporting ───────────────────────────────────────────
; Show all errors in development
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; ─── Performance ───────────────────────────────────────────────
; Max time a script can run (seconds)
max_execution_time = 300

; Max time for input parsing (file uploads etc.)
max_input_time = 300

; Max memory a script can use
memory_limit = 512M

; Realpath cache (speeds up file lookups)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ─── File Uploads ──────────────────────────────────────────────
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; ─── Input Limits ──────────────────────────────────────────────
max_input_vars = 5000
max_input_nesting_level = 64

; ─── String Settings ───────────────────────────────────────────
default_charset = "UTF-8"

; ─── Timezone ──────────────────────────────────────────────────
; Change this to your timezone
date.timezone = Asia/Kolkata

; ─── OPcache (Speeds up PHP significantly) ─────────────────────
[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.validate_timestamps = 1

; ─── Session ───────────────────────────────────────────────────
[Session]
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_samesite = "Lax"

; ─── PDO / MySQL ───────────────────────────────────────────────
[MySQLi]
mysqli.default_socket = /var/run/mysqld/mysqld.sock

; ─── cURL ──────────────────────────────────────────────────────
[curl]
; curl.cainfo = /etc/ssl/certs/ca-certificates.crt

; ─── Mail (handled by Mailpit in Docker) ───────────────────────
[mail function]
SMTP = dev-mailpit
smtp_port = 1025
sendmail_from = noreply@localhost