services:
  # 1. PHP-FPM Application Container
  vyapar-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vyapar-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - prod-network

  # 2. Nginx Web Server (The entry point)
  vyapar-nginx:
    image: nginx:alpine
    container_name: vyapar-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - vyapar-app
    networks:
      - prod-network

  # 3. MySQL Database (Free Tier Compatible)
  vyapar-db:
    image: mysql:8.0
    container_name: vyapar-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - vyapar-db-data:/var/lib/mysql
    networks:
      - prod-network

networks:
  prod-network:
    driver: bridge

volumes:
  vyapar-db-data:
    driver: local